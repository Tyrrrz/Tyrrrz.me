name: main

on:
  workflow_dispatch:
  push:
    branches:
      - prime
  pull_request:
    branches:
      - prime
  schedule:
    # Rebuild nightly to refresh dynamic data (project stats, donation info, etc.)
    - cron: '0 0 * * *'

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify formatting
        run: yarn run format:check

      - name: Perform linting
        run: yarn run link:check

  pack:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build site
        env:
          BUILD_ID: ${{ github.sha }}
          SITE_URL: https://tyrrrz.me
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATREON_TOKEN: ${{ secrets.PATREON_TOKEN }}
          BUYMEACOFFEE_TOKEN: ${{ secrets.BUYMEACOFFEE_TOKEN }}
          PRIVATE_DONORS: ${{ secrets.PRIVATE_DONORS }}
        run: yarn build

      - name: Upload build assets
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: out/

  deploy:
    if: ${{ github.event_name != 'pull_request' }}

    needs:
      - format
      - pack

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
